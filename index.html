<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-CAL</title>
    <meta name="description" content="キャンピングカーの総重量と前軸・後軸の重量配分を計算し、許容車両総重量（GVWR）内に収まるか確認します。">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .option-item.locked-default {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.4);
            pointer-events: none;
            cursor: default;
        }
        .option-item.locked-default .option-name {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="background-mesh"></div>
    <div class="app-container">
        <header>
            <img src="logo.png" alt="V-CAL ロゴ" class="main-logo">
            <p><span class="version-badge">v1.18</span></p>
            <p><span class="sub-title">For Leaves3</span></p>
        </header>

        <main class="dashboard">
            <section class="input-section">
                <!-- Style Select -->
                <div class="card glass">
                    <h2><span class="icon">✨</span> スタイル選択</h2>
                    <div class="input-group no-bottom-margin">
                        <!-- デバッグ用: フリースタイルはタブ外に隠す -->
                        <input type="radio" id="style_custom" name="camper_style" value="custom" hidden>
                        <div class="tab-selector" id="styleSelector">
                            <input type="radio" id="style_family" name="camper_style" value="family" checked>
                            <label for="style_family">Family</label>
                            
                            <input type="radio" id="style_wmax" name="camper_style" value="wmax">
                            <label for="style_wmax">W-max</label>
                            
                            <input type="radio" id="style_emax" name="camper_style" value="emax">
                            <label for="style_emax">E-max</label>
                            
                            <input type="radio" id="style_premium" name="camper_style" value="premium">
                            <label for="style_premium">Premium</label>
                        </div>
                    </div>
                </div>

                <!-- Passengers -->
                <div class="card glass">
                    <h2><span class="icon">👥</span> 乗車定員</h2>
                    <div class="input-group">
                        <label>乗車人数 (1人あたり55kg)</label>
                        <div class="tab-selector" id="passengerSelector">
                            <input type="radio" name="passengerCount" id="p3" value="3">
                            <label for="p3">3人</label>
                            <input type="radio" name="passengerCount" id="p4" value="4">
                            <label for="p4">4人</label>
                            <input type="radio" name="passengerCount" id="p6" value="6" checked>
                            <label for="p6">6人</label>
                        </div>
                    </div>
                </div>

                <!-- Options -->
                <div class="card glass">
                    <div class="options-card-header">
                        <h2><span class="icon">🛠️</span> オプション</h2>
                        <button id="clearOptionsBtn">全選択解除</button>
                    </div>
                    <div class="options-grid" id="optionsContainer"></div>
                </div>

                <!-- Fluids & Water -->
                <div class="card glass">
                    <h2><span class="icon">💧</span> 水タンク</h2>
                    <div class="options-grid" id="waterContainer"></div>
                </div>

                <!-- Vehicle Settings -->
                <div class="card glass">
                    <h2><span class="icon">🚐</span> 車両基本情報</h2>
                    <div class="input-row">
                        <div class="input-group half">
                            <label for="baseFrontWeight" title="前軸重">ベース車 前軸重 (kg)</label>
                            <input type="number" id="baseFrontWeight" value="1525" min="0" step="5" readonly disabled class="readonly-input">
                        </div>
                        <div class="input-group half">
                            <label for="baseRearWeight" title="後軸重">ベース車 後軸重 (kg)</label>
                            <input type="number" id="baseRearWeight" value="1535" min="0" step="5" readonly disabled class="readonly-input">
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group half">
                            <label for="frontGawr">前軸許容荷重 (kg)</label>
                            <input type="number" id="frontGawr" value="1900" min="0" step="10" readonly disabled class="readonly-input">
                        </div>
                        <div class="input-group half">
                            <label for="rearGawr">後軸許容荷重 (kg)</label>
                            <input type="number" id="rearGawr" value="2300" min="0" step="10" readonly disabled class="readonly-input">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="gvwr">許容車両総重量・GVWR (kg)</label>
                        <input type="number" id="gvwr" value="3490" min="0" step="10" readonly disabled class="readonly-input">
                    </div>
                </div>

            </section>

            <section class="summary-section sticky">
                <div class="summary-card glass">
                    <h2>車両総重量</h2>
                    
                    <div class="total-display">
                        <div class="current-weight">
                            <span id="totalWeightDisplay">3198</span><span class="unit">kg</span>
                        </div>
                        <div class="gvwr-target">
                            / 最大許容 <span id="gvwrDisplay">3500</span> kg
                        </div>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-bar" id="weightProgressBar"></div>
                    </div>
                    
                    <div class="remaining-display" id="remainingDisplay">
                        <span id="remainingWeightLabel">最大許容まで: </span><span id="remainingWeightValue">302</span><span> kg</span>
                    </div>

                    <div class="axle-summary">
                        <h3>軸重リミット</h3>
                        <div class="axle-stat">
                            <div class="axle-labels">
                                <span>前軸 (<span id="frontWeightRaw">1200</span> / <span id="frontGawrDisplay">1600</span> kg)</span>
                                <span id="frontRemaining" class="remaining">残り 400 kg</span>
                            </div>
                            <div class="progress-bar-container small">
                                <div class="progress-bar" id="frontProgressBar"></div>
                            </div>
                        </div>
                        <div class="axle-stat">
                            <div class="axle-labels">
                                <span>後軸 (<span id="rearWeightRaw">1300</span> / <span id="rearGawrDisplay">2000</span> kg)</span>
                                <span id="rearRemaining" class="remaining">残り 700 kg</span>
                            </div>
                            <div class="progress-bar-container small">
                                <div class="progress-bar" id="rearProgressBar"></div>
                            </div>
                        </div>
                    </div>

                    <div class="breakdown">
                        <h3>内訳</h3>
                        <div class="breakdown-item">
                            <span>標準装備重量</span>
                            <span id="breakdownBase">2500 kg</span>
                        </div>
                        <div class="breakdown-item">
                            <span>乗車定員</span>
                            <span id="breakdownPassengers">150 kg</span>
                        </div>
                        <div class="breakdown-item">
                            <span>生活用水タンク</span>
                            <span id="breakdownWater">0 kg</span>
                        </div>
                        <div class="breakdown-item">
                            <span>オプション</span>
                            <span id="breakdownOptions">0 kg</span>
                        </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
